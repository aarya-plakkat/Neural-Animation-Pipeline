<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Speech Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        
        input[type="text"] {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 5px;
            background: #333;
            color: white;
            margin: 20px 0;
        }
        
        button {
            padding: 15px 30px;
            font-size: 16px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        
        button:hover {
            background: #005a9e;
        }
        
        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 5px;
            background: #333;
        }
        
        .success { background: #0a5d2b; }
        .error { background: #5d0a0a; }
        
        select {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            font-size: 14px;
            background: #333;
            color: white;
            border: 2px solid #444;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .controls {
            margin: 20px 0;
        }
        
        .controls label {
            display: block;
            margin: 10px 0 5px 0;
        }
        
        .controls input[type="range"] {
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Simple Native Speech Test</h1>
        <p>This is a minimal test to verify native browser speech synthesis works properly.</p>
        
        <div class="status" id="status">Ready to test speech...</div>
        
        <input type="text" id="textInput" placeholder="Type something to speak..." value="Hello! This is a test of native speech synthesis with perfect clarity.">
        
        <div class="controls">
            <label for="voiceSelect">Select Voice:</label>
            <select id="voiceSelect"></select>
            
            <label for="rateRange">Speech Rate: <span id="rateValue">1.0</span></label>
            <input type="range" id="rateRange" min="0.1" max="3" step="0.1" value="1">
            
            <label for="pitchRange">Speech Pitch: <span id="pitchValue">1.0</span></label>
            <input type="range" id="pitchRange" min="0" max="2" step="0.1" value="1">
        </div>
        
        <button onclick="testSpeech()">🗣️ Speak Text</button>
        <button onclick="stopSpeech()">⏹️ Stop Speech</button>
        <button onclick="listVoices()">🔄 Refresh Voices</button>
    </div>

    <script>
        let voices = [];
        
        function updateStatus(message, type = '') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            console.log('Status:', message);
        }
        
        function listVoices() {
            updateStatus('Loading voices...');
            
            if (!('speechSynthesis' in window)) {
                updateStatus('❌ Speech synthesis not supported in this browser', 'error');
                return;
            }
            
            voices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voiceSelect');
            voiceSelect.innerHTML = '';
            
            if (voices.length === 0) {
                updateStatus('⚠️ No voices available. Try clicking "Refresh Voices" again.', 'error');
                voiceSelect.innerHTML = '<option>No voices found</option>';
                return;
            }
            
            voices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${voice.name} (${voice.lang})${voice.default ? ' - Default' : ''}`;
                if (voice.default) option.selected = true;
                voiceSelect.appendChild(option);
            });
            
            updateStatus(`✅ Found ${voices.length} voices`, 'success');
        }
        
        function testSpeech() {
            const text = document.getElementById('textInput').value.trim();
            
            if (!text) {
                updateStatus('❌ Please enter some text to speak', 'error');
                return;
            }
            
            if (!('speechSynthesis' in window)) {
                updateStatus('❌ Speech synthesis not supported', 'error');
                return;
            }
            
            // Stop any current speech
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Get selected voice
            const voiceSelect = document.getElementById('voiceSelect');
            if (voiceSelect.selectedIndex >= 0 && voices.length > 0) {
                utterance.voice = voices[voiceSelect.selectedIndex];
                console.log('Using voice:', utterance.voice.name);
            }
            
            // Set rate and pitch
            utterance.rate = parseFloat(document.getElementById('rateRange').value);
            utterance.pitch = parseFloat(document.getElementById('pitchRange').value);
            utterance.volume = 1.0;
            
            // Event handlers
            utterance.onstart = () => {
                updateStatus('🗣️ Speaking...', 'success');
                console.log('Speech started');
            };
            
            utterance.onend = () => {
                updateStatus('✅ Speech completed successfully!', 'success');
                console.log('Speech ended');
            };
            
            utterance.onerror = (event) => {
                updateStatus(`❌ Speech error: ${event.error}`, 'error');
                console.error('Speech error:', event);
            };
            
            utterance.onpause = () => {
                updateStatus('⏸️ Speech paused', '');
                console.log('Speech paused');
            };
            
            utterance.onresume = () => {
                updateStatus('▶️ Speech resumed', 'success');
                console.log('Speech resumed');
            };
            
            // Start speaking
            console.log('Starting speech synthesis with:', {
                text: text,
                voice: utterance.voice ? utterance.voice.name : 'default',
                rate: utterance.rate,
                pitch: utterance.pitch
            });
            
            speechSynthesis.speak(utterance);
            updateStatus('🎵 Initializing speech...', '');
        }
        
        function stopSpeech() {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                updateStatus('⏹️ Speech stopped', '');
                console.log('Speech stopped');
            }
        }
        
        // Update range value displays
        document.getElementById('rateRange').addEventListener('input', function() {
            document.getElementById('rateValue').textContent = this.value;
        });
        
        document.getElementById('pitchRange').addEventListener('input', function() {
            document.getElementById('pitchValue').textContent = this.value;
        });
        
        // Initialize on page load
        window.addEventListener('load', function() {
            console.log('Page loaded, initializing speech test...');
            
            // Check for speech synthesis support
            if ('speechSynthesis' in window) {
                updateStatus('✅ Speech synthesis supported!', 'success');
                
                // Load voices immediately
                listVoices();
                
                // Also load voices when they become available (some browsers load them async)
                speechSynthesis.onvoiceschanged = listVoices;
                
                // Set up Enter key to trigger speech
                document.getElementById('textInput').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        testSpeech();
                    }
                });
                
            } else {
                updateStatus('❌ Speech synthesis not supported in this browser', 'error');
            }
        });
        
        // Additional debugging
        console.log('Browser info:', {
            userAgent: navigator.userAgent,
            speechSynthesis: 'speechSynthesis' in window,
            speechSynthesisUtterance: 'SpeechSynthesisUtterance' in window
        });
    </script>
</body>
</html>
